<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perbandingan Biaya Jasa Kirim</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 580px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        input {
            width: 100%;
            padding: 11px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #007bff;
        }
        .dimensi-fields {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        button.btn-hitung {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button.btn-hitung:hover {
            background-color: #0056b3;
        }
        /* Style Tabel Perbandingan */
        .compare-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .compare-table th, .compare-table td {
            border: 1px solid #ddd;
            padding: 12px 10px;
            text-align: left;
            font-size: 13px;
        }
        .compare-table th {
            background-color: #f8f9fa;
            color: #333;
            font-weight: 600;
        }
        .compare-table tbody tr {
            background-color: #ffffff;
        }
        .text-info-opsi {
            font-size: 11px;
            color: #666;
            display: block;
            font-weight: normal;
            margin-top: 2px;
        }
        .text-penalti {
            font-size: 11px;
            color: #fd7e14;
            display: block;
            font-weight: bold;
            margin-top: 2px;
        }
        .text-minimal {
            font-size: 11px;
            color: #dc3545;
            display: block;
            font-weight: bold;
            margin-top: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Kalkulator Banding Jasa Kirim</h2>
    <p class="subtitle">Masukkan data paket untuk membandingkan semua biaya layanan sekaligus.</p>
    
    <div class="form-group">
        <label>Dimensi Paket (Centimeter)</label>
        <div class="dimensi-fields">
            <input type="number" id="p_comp" placeholder="P (cm)" min="0">
            <input type="number" id="l_comp" placeholder="L (cm)" min="0">
            <input type="number" id="t_comp" placeholder="T (cm)" min="0">
        </div>
    </div>

    <div class="form-group">
        <label for="b_comp">Berat Aktual Paket (kg)</label>
        <input type="number" id="b_comp" placeholder="Masukkan berat asli paket" min="0">
    </div>

    <button class="btn-hitung" onclick="bandingkanJasa()">Bandingkan Semua Jasa</button>

    <div id="hasil-compare" style="display:none; margin-top: 25px;">
        <h4 style="margin-bottom: 10px; color: #333; font-size: 15px;">Hasil Analisis (Termurah -> Termahal):</h4>
        <table class="compare-table">
            <thead>
                <tr>
                    <th>Nama Jasa</th>
                    <th>Volume / Satuan</th>
                    <th>Total Biaya</th>
                </tr>
            </thead>
            <tbody id="compare-tbody">
                </tbody>
        </table>
    </div>
</div>

<script>
    const CONFIG = {
        hematDaru: { pembagi: 4000, harga: 10000, minTarif: 10000 },
        kargo2Daru: { pembagi: 1000000, harga: 1900000 },
        kargo1Miko: { pembagi: 4000, harga: 7000 },
        kargo2Miko: { pembagi: 1000000, harga: 1900000 },
        pelniDaru: { pembagiVol: 4000, harga: 20000, minTarif: 20000 },
        pelniMiko: { pembagiVol: 4000, harga: 20000, minTarif: 20000 },
        pesawatDaru: { hargaPerGram: 77000 }
    };

    const formatRupiah = (angka) => {
        return new Intl.NumberFormat('id-ID', {
            style: 'currency', currency: 'IDR', minimumFractionDigits: 0
        }).format(angka);
    };

    const bulatkanKeAtasRibu = (nominal) => {
        return Math.ceil(nominal / 1000) * 1000;
    };

    // Logika pembulatan custom Kargo Daru (Aturan desimal 0.15 dan loncat 0.16 -> 0.2)
    const hitungPembulatanKargoDaru = (val) => {
        let duaDesimalTerdekat = Math.round(val * 100) / 100;
        let lantaiSatuDesimal = Math.floor(duaDesimalTerdekat * 10) / 10;
        let sisaDigitKeDua = parseFloat((duaDesimalTerdekat - lantaiSatuDesimal).toFixed(2));

        if (lantaiSatuDesimal === 0.1 && sisaDigitKeDua > 0.05) {
            return 0.2;
        } else if (lantaiSatuDesimal > 0.1 && sisaDigitKeDua > 0.05) {
            return parseFloat((lantaiSatuDesimal + 0.1).toFixed(1));
        }
        return duaDesimalTerdekat;
    };

    function bandingkanJasa() {
        const p = parseFloat(document.getElementById('p_comp').value) || 0;
        const l = parseFloat(document.getElementById('l_comp').value) || 0;
        const t = parseFloat(document.getElementById('t_comp').value) || 0;
        const b = parseFloat(document.getElementById('b_comp').value) || 0;

        if (p <= 0 || l <= 0 || t <= 0 || b <= 0) {
            alert("Silakan isi semua kolom Dimensi (P, L, T) DAN Berat Aktual dengan benar.");
            return;
        }

        const hasilBanding = [];
        const volM3Murni = (p * l * t) / 1000000;
        
        const volKargoDaruFinalCustom = hitungPembulatanKargoDaru(volM3Murni);

        // --- 1. Hemat Daru (Kunci Tarif Rp 10.000 jika hasil <= 1 kg) ---
        const beratVolHematDaru = (p * l * t) / CONFIG.hematDaru.pembagi;
        const beratAcuanAwal = Math.max(b, beratVolHematDaru);
        
        // Menambahkan toleransi penambahan berat tetap +0.5 kg sesuai struktur struk asli
        let beratTagihanHemat = beratAcuanAwal + 0.5;
        
        // Penyesuaian presisi desimal spesifik agar pas dengan akhiran struk (.53 / .62 / .74)
        if (Math.abs((beratTagihanHemat - Math.floor(beratTagihanHemat)) - 0.525) < 0.01) {
            beratTagihanHemat = Math.floor(beratTagihanHemat) + 0.53;
        } else {
            beratTagihanHemat = parseFloat(beratTagihanHemat.toFixed(2));
        }

        let totalHematDaru = 0;
        let namaHematDaruFinal = "Hemat (Daru)";

        // KONDISI BARU: Jika berat tagihan akhir 1kg ke bawah, kunci biaya total ke Rp 10.000
        if (beratTagihanHemat <= 1.0) {
            totalHematDaru = CONFIG.hematDaru.minTarif;
            namaHematDaruFinal += ' <span class="text-minimal">(Min. 1kg Kebawah)</span>';
        } else {
            totalHematDaru = Math.round(beratTagihanHemat * CONFIG.hematDaru.harga);
        }
        
        if (b <= beratVolHematDaru) {
            namaHematDaruFinal += ' <span class="text-penalti">(Vol Lebih Besar)</span>';
        } else {
            namaHematDaruFinal += ' <span class="text-info-opsi">(Berat Aktual)</span>';
        }
        
        let txtVolHematDaru = `${beratTagihanHemat.toFixed(2)} kg`;
        hasilBanding.push({ nama: namaHematDaruFinal, volumeText: txtVolHematDaru, total: totalHematDaru });

        // --- 2. Kargo Daru ---
        let totalKargoDaruFinal = 0;
        let namaKargoDaruFinal = "Kargo (Daru)";
        let txtVolKargoDaruFinal = "";
        let pushKargoDaru = false;

        if (volM3Murni < 0.02) {
            totalKargoDaruFinal = 25000;
            txtVolKargoDaruFinal = `${volKargoDaruFinalCustom.toFixed(2)} m³`;
            namaKargoDaruFinal += ' <span class="text-minimal">(di bawah volume)</span>';
            pushKargoDaru = true;
        } else {
            if (b >= 5 || volM3Murni >= 0.02) { 
                totalKargoDaruFinal = bulatkanKeAtasRibu(volKargoDaruFinalCustom * CONFIG.kargo2Daru.harga);
                txtVolKargoDaruFinal = `${volKargoDaruFinalCustom.toFixed(2)} m³`;
                namaKargoDaruFinal += ' <span class="text-info-opsi">(Skema m³)</span>';
                pushKargoDaru = true;
            }
        }

        if (pushKargoDaru) {
            hasilBanding.push({ nama: namaKargoDaruFinal, volumeText: txtVolKargoDaruFinal, total: totalKargoDaruFinal });
        }

        // --- 3. Kargo Miko ---
        const beratVolKargo1MikoMurni = (p * l * t) / CONFIG.kargo1Miko.pembagi; 

        if (beratVolKargo1MikoMurni >= 5) {
            const totalKargo1Miko = bulatkanKeAtasRibu(beratVolKargo1MikoMurni * CONFIG.kargo1Miko.harga);
            const totalKargo2Miko = bulatkanKeAtasRibu(volM3Murni * CONFIG.kargo2Miko.harga);

            let totalKargoMikoFinal = 0;
            let namaKargoMikoFinal = "Kargo (Miko)";
            let txtVolKargoMikoFinal = "";

            if (totalKargo1Miko >= totalKargo2Miko) {
                totalKargoMikoFinal = totalKargo1Miko;
                txtVolKargoMikoFinal = `${beratVolKargo1MikoMurni.toFixed(2)} kg`;
                namaKargoMikoFinal += ' <span class="text-info-opsi">(Skema Kargo 1 - Vol kg)</span>';
            } else {
                totalKargoMikoFinal = totalKargo2Miko;
                txtVolKargoMikoFinal = `${volM3Murni.toFixed(4)} m³`;
                namaKargoMikoFinal += ' <span class="text-info-opsi">(Skema Kargo 2 - m³)</span>';
            }
            hasilBanding.push({ nama: namaKargoMikoFinal, volumeText: txtVolKargoMikoFinal, total: totalKargoMikoFinal });
        }

        // --- 4. Pelni Daru (Batas Bawah 1kg = Flat Rp 20.000) ---
        const beratVolPelniDaru = (p * l * t) / CONFIG.pelniDaru.pembagiVol;
        let totalPelniDaru = 0;
        let namaPelniDaruFinal = "Pelni (Daru)";
        let txtVolPelniDaru = "";
        let beratAcuanPelniDaru = Math.max(b, beratVolPelniDaru);

        if (b <= beratVolPelniDaru) {
            namaPelniDaruFinal += ' <span class="text-penalti">(Pelni Penalti)</span>';
            txtVolPelniDaru = `${beratVolPelniDaru.toFixed(2)} kg`;
        } else {
            namaPelniDaruFinal += ' <span class="text-info-opsi">(Pelni Ori)</span>';
            txtVolPelniDaru = `${b.toFixed(2)} kg`;
        }

        if (beratAcuanPelniDaru < 1) {
            totalPelniDaru = CONFIG.pelniDaru.minTarif;
            namaPelniDaruFinal += ' <span class="text-minimal">(Min. di bawah 1kg)</span>';
        } else {
            totalPelniDaru = bulatkanKeAtasRibu(beratAcuanPelniDaru * CONFIG.pelniDaru.harga);
        }
        hasilBanding.push({ nama: namaPelniDaruFinal, volumeText: txtVolPelniDaru, total: totalPelniDaru });

        // --- 5. Pelni Miko (Batas Bawah 1kg = Flat Rp 20.000) ---
        const beratVolPelniMiko = (p * l * t) / CONFIG.pelniMiko.pembagiVol;
        let totalPelniMiko = 0;
        let namaPelniMikoFinal = "Pelni (Miko)";
        let txtVolPelniMiko = "";
        let beratAcuanPelniMiko = Math.max(b, beratVolPelniMiko);

        if (b <= beratVolPelniMiko) {
            namaPelniMikoFinal += ' <span class="text-penalti">(Pelni Penalti)</span>';
            txtVolPelniMiko = `${beratVolPelniMiko.toFixed(2)} kg`;
        } else {
            namaPelniMikoFinal += ' <span class="text-info-opsi">(Pelni Ori)</span>';
            txtVolPelniMiko = `${b.toFixed(2)} kg`;
        }

        if (beratAcuanPelniMiko < 1) {
            totalPelniMiko = CONFIG.pelniMiko.minTarif;
            namaPelniMikoFinal += ' <span class="text-minimal">(Min. di bawah 1kg)</span>';
        } else {
            totalPelniMiko = bulatkanKeAtasRibu(beratAcuanPelniMiko * CONFIG.pelniMiko.harga);
        }
        hasilBanding.push({ nama: namaPelniMikoFinal, volumeText: txtVolPelniMiko, total: totalPelniMiko });

        // --- 6. Pesawat Daru ---
        const beratDalamGram = b * 1000; 
        const totalPesawatDaru = bulatkanKeAtasRibu(beratDalamGram * CONFIG.pesawatDaru.hargaPerGram);
        const txtVolPesawatDaru = `${beratDalamGram.toLocaleString('id-ID')} gram`;
        const namaPesawatDaruFinal = 'Pesawat (Daru) <span class="text-info-opsi">(Murni Aktual Gram)</span>';
        hasilBanding.push({ nama: namaPesawatDaruFinal, volumeText: txtVolPesawatDaru, total: totalPesawatDaru });

        // --- Proses Sorting Akhir ---
        hasilBanding.sort((a, b) => a.total - b.total);

        // Render Data ke Tabel
        const tbody = document.getElementById('compare-tbody');
        tbody.innerHTML = ""; 

        hasilBanding.forEach((jasa) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <div style="display: flex; flex-direction: column;">
                        <span>${jasa.nama}</span>
                    </div>
                </td>
                <td>${jasa.volumeText}</td>
                <td>${formatRupiah(jasa.total)}</td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('hasil-compare').style.display = 'block';
    }
</script>

</body>
</html>
